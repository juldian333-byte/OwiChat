{% extends 'base.html' %}
{% load static %}

{% block title %}Buat Grup - OWI Chat{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-card">
        <h2>Buat Grup Baru</h2>
        
        <form method="POST" enctype="multipart/form-data" class="create-group-form">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="name">Nama Grup</label>
                <input type="text" id="name" name="name" class="form-control" placeholder="Nama grup..." required>
            </div>
            
            <div class="form-group">
                <label for="avatar">Avatar Grup (Opsional)</label>
                <input type="file" id="avatar" name="avatar" class="form-control" accept="image/*">
            </div>
            
            <div class="form-group">
                <label>Tambahkan Anggota</label>
                <div class="participants-select">
                    {% for user in users %}
                        <label class="checkbox-label">
                            <input type="checkbox" name="participants" value="{{ user.id }}">
                            <span class="checkbox-custom"></span>
                            <img src="{{ user.profile.get_avatar_url }}" alt="{{ user.username }}" class="user-avatar-small">
                            <span class="username">{{ user.get_full_name|default:user.username }}</span>
                        </label>
                    {% endfor %}
                </div>
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Buat Grup</button>
                <a href="{% url 'chat:chat_list' %}" class="btn btn-secondary">Batal</a>
            </div>
        </form>
    </div>
</div>

<style>
    .participants-select {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        margin-top: 1rem;
    }
    
    .checkbox-label {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem;
        border-radius: 0.5rem;
        cursor: pointer;
        transition: background-color 0.3s;
    }
    
    .checkbox-label:hover {
        background-color: #f0f0f0;
    }
    
    .checkbox-label input[type="checkbox"] {
        margin-right: 0.5rem;
    }
    
    .user-avatar-small {
        width: 32px;
        height: 32px;
        border-radius: 50%;
    }
    
    .checkbox-label .username {
        flex: 1;
    }
</style>
{% endblock %}
